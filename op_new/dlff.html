<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="maximum-scale=1.0, minimum-scale=1.0, user-scalable=0, initial-scale=1.0,width=device-width,viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>تحميل التطبيق</title>
  <link rel="icon" type="image/png" href="./images/icon.png">
  <script src="./js/env.js"></script>
  <script src="./js/crypto-js.min.js"></script>
  <script src="./js/md5.min.js"></script>
  <script src="./js/requestEncrypt.js"></script>
  <script src="./js/encryptedRequest.js"></script>
  <script>
    // 通过统一加密封装获取 apkHost，内部已带 scene=gold 等公共参数
    window.__apkHost = null;
    try {
      if (window.EncryptedRequest && typeof EncryptedRequest.post === 'function') {
        EncryptedRequest.post('/user/gdUser/judAuditVersion')
          .then(function (d) {
            if (d && d.code === 200 && d.data && d.data.apkHost) {
              window.__apkHost = d.data.apkHost;
            }
          })
          .catch(function () {});
      }
    } catch (e) {}
  </script>
  <script>
    function IsPhone() {
      var info = navigator.userAgent;
      var isPhone = /mobile/i.test(info);
      return isPhone;
    }
    var setHtmlFontSize = () => {
      var htmlDom = document.getElementsByTagName('html')[0]
      var htmlWidth = document.documentElement.clientWidth || document.body.clientWidth
      const html = window.document.documentElement;
      const deviceWidth = html.getBoundingClientRect().width;
      const designWidth = 750;
      const initFontSize = 100;

      if (IsPhone()) {
        html.style.fontSize = (deviceWidth / designWidth) * initFontSize + "px";
      } else {
        html.style.fontSize = 54 + "px";
      }
    }
    window.onresize = setHtmlFontSize
    setHtmlFontSize()
  </script>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    body,
    html {
      font-size: 0.28rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica,
        Segoe UI, Arial, Roboto, 'PingFang SC', miui, 'Hiragino Sans GB',
        'Microsoft Yahei', sans-serif;
      max-width: 425px;
      margin: 0 auto;
      background-color: #1A1D2DFF;
    }
    body{
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }
    body::-webkit-scrollbar {
      display: none;
      width: 0;
    }

    html {
      -webkit-font-smoothing: antialiased !important;
      -webkit-text-size-adjust: 100%;
    }

    img {
      width: 100%;
      display: block;
    }

    li {
      list-style: none;
    }

    a {
      text-decoration: none;
      color: #000;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-weight: normal;
    }

    input,
    select,
    button {
      outline: none;
    }

    /* EG 镜像 RTL 样式（黑金底 + 保留 RTL） */
    .download {
      max-width: 425px;
      padding-top: 3.8em;
      min-height: 100vh;
      box-sizing: border-box;
      background: linear-gradient(to bottom, #3D1900, #D87B00);
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      direction: rtl;
    }

    .download::-webkit-scrollbar {
      display: none;
      width: 0;
    }

    .download-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-direction: row-reverse;
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      top: 0;
      z-index: 3;
      max-width: 425px;
      width: 100%;
      height: 1.2rem;
      padding: 0 0.2rem;
      background-color: transparent;
      direction: rtl;
    }

    .download-box__logo-box {
      width: 3rem;
    }

    .download-box__download-box {
      width: 2.16rem;
      height: 0.68rem;
      line-height: 0.68rem;
      background: linear-gradient(3deg, #FFF7A0 12%, #CD9731 100%);
      border-radius: 0.32rem;
      color: #653E26;
      text-align: center;
      font-size: 0.24rem;
      animation: run 2.3s linear infinite forwards;
    }

    .code-box {
      color: #999;
    }

    .code-box .code {
      color: #FFFFFF;
      font-weight: bold;
      margin-bottom: 0.1rem;
    }

    .code-box .code-tit {
      font-size: 0.26rem;
      color: rgba(255,255,255,0.8);
    }

    .download-box--top {
      top: 0;
    }

    .main {
      height: 94vh;
      position: relative;
      direction: rtl;
    }

    .title {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 2.3rem;
      background-size: 100% auto;
      background-position: center center;
      transform: scale(0.9);
    }

    .content {
      width: 100%;
      height: 12rem;
      background-size: 100% auto;
      background-position: center top;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .people {
      width: 4.8rem;
      height: 8rem;
      background-size: 100% 100%;
      position: absolute;
      bottom: 0;
      right: auto;
      left: 0;
    }

    .footer {
      width: 100%;
      height: 4.58rem;
      background-size: 100% 100%;
      background-position: center center;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    @keyframes run {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    @media only screen and (max-height: 667px) {
      .content {
        height: 10.8rem !important;
        transform: scale(0.9);
      }

      .title {
        transform: scale(0.8);
      }

      .people {
        width: 4rem !important;
        height: 6.6rem !important;
      }

      .footer {
        height: 4.2rem !important;
      }
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 0.2rem 0.4rem;
      border-radius: 0.1rem;
      font-size: 0.24rem;
      z-index: 9999;
      display: none;
    }

    .toast.show {
      display: block;
      animation: fadeInOut 2s;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="download in">
      <div class="download-box download-box--top">
        <div class="download-box__logo-box">
          <div class="code-box" id="codeBox" style="display: none;">
            <h2 class="code" id="inviteCode"></h2>
            <p class="code-tit" id="inviteCodeTitle">رمز الدعوة</p>
          </div>
        </div>
        <div class="download-box__download-box">
          <div id="downloadBtn">تحميل</div>
        </div>
      </div>
      <div class="main">
        <div class="title" id="titleImg"></div>
        <div class="content" id="appImg">
        </div>
        
        <div class="people" id="peopleImg"></div>
        <div class="footer" id="joinImg"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      let apkHost = null;

      function getApiBaseUrl() {
        return 'https://ieg.yano777.com';
      }

      function getUrlParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name) || '';
      }

      function fetchApkHost() {
        const apiBaseUrl = getApiBaseUrl();
        const apiUrl = apiBaseUrl + '/user/gdUser/judAuditVersion';

        fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        })
        .then(response => response.json())
        .then(data => {
          if (data.code === 200 && data.data && data.data.apkHost) {
            apkHost = data.data.apkHost;
          }
        })
        .catch(error => {
        });
      }

      function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 2000);
      }

      function copyCode() {
        const code = document.getElementById('inviteCode').textContent;
        if (!code) return;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code).then(() => {
            showToast('تم نسخ رمز الدعوة بنجاح!');
          }).catch(() => {
            fallbackCopyCode(code);
          });
        } else {
          fallbackCopyCode(code);
        }
      }

      function fallbackCopyCode(text) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.opacity = '0';
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          showToast('تم نسخ رمز الدعوة بنجاح!');
        } catch (err) {
          showToast('فشل نسخ رمز الدعوة!');
        }
        document.body.removeChild(textArea);
      }

      function downLoadApp(pos) {
        const code = document.getElementById('inviteCode').textContent;
        if (code) {
          copyCode();
        }

        // EG 走 APK 下载
        const apkName = getUrlParam('apkName') || 'base';
        const urlApkHost = getUrlParam('apkHost');
        const finalApkHost = urlApkHost || apkHost;

        if (!finalApkHost) {
          showToast('عنوان التحميل غير متوفر');
          return;
        }

        const url = finalApkHost + '/apkeg/' + apkName + '.apk';

        if (url) {
          setTimeout(function() {
            window.location.href = url;
          }, 50);
        }
      }

      function init() {
        fetchApkHost();

        const app_in_code = getUrlParam('app_in_code');
        const lang = getUrlParam('lang') || 'ar';

        if (app_in_code) {
          document.getElementById('inviteCode').textContent = app_in_code;
          document.getElementById('codeBox').style.display = 'block';

          const titles = {
            'en': 'Invite Code',
            'ar': 'رمز الدعوة',
            'hi': 'आमंत्रण कोड'
          };
          document.getElementById('inviteCodeTitle').textContent = titles[lang] || titles['ar'];
        }

        const downloadTexts = {
          'en': 'DOWNLOAD',
          'ar': 'تحميل',
          'hi': 'डाउनलोड'
        };
        document.getElementById('downloadBtn').textContent = downloadTexts[lang] || downloadTexts['ar'];

        document.getElementById('titleImg').style.backgroundImage = 'url(./appicon/title.png)';
        document.getElementById('appImg').style.backgroundImage = 'url(./appicon/app.png)';
        document.getElementById('peopleImg').style.backgroundImage = 'url(./appicon/people.png)';
        document.getElementById('joinImg').style.backgroundImage = 'url(./appicon/join.png)';

        function bindDownloadEvent() {
          const downloadElement = document.querySelector('.download.in');
          if (downloadElement) {
            downloadElement.addEventListener('click', function() {
              downLoadApp('top');
            });
          }
        }

        bindDownloadEvent();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      window.downLoadApp = downLoadApp;
    })();
  </script>
</body>
</html>
