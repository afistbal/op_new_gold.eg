<!DOCTYPE html>
<html lang="en"> <!-- 会在脚本中替换 -->

<head>
    <meta charset="UTF-8" />
    <title>Beginner Guide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="./images/icon.png" />
    <style>
        /* ===== 全局基础（黑金版，EG 保留 RTL/镜像逻辑） ===== */
        body {
            font-family: "Roboto", "Inter", Arial, sans-serif;
            background: #1A1D2DFF;
            margin: 0;
            padding: 12px;
            color: #BAC2D2FF;
        }

        .container-beginner-guide {
            max-width: 400px;
            margin: 0 auto;
        }

        /* 每一块引导内容卡片 */
        .beginner-guide > div {
            background: #2F3547;
            margin-bottom: 16px;
            padding: 12px 10px;
            font-size: 14px;
            border-radius: 8px;
        }

        /* 图片占满可用宽度 */
        .beginner-guide img {
            width: 100%;
            max-width: 100%;
            display: block;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        /* 文本：浅色、行距稍大 */
        .beginner-guide p {
            margin: 4px 0;
            color: #BAC2D2FF;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="container-beginner-guide">
        <div class="beginner-guide" id="guide-container"><!-- 动态内容 --></div>
    </div>
    <script src="./js/lang.js"></script>
    <script>

        /* ---------------------------
         * 读取 URL 参数
         * ------------------------- */
        function getUrlParam(key) {
            var params = new URLSearchParams(window.location.search);
            return params.get(key);
        }

        /* ---------------------------
         * 统一语言码格式（可选增强）
         * - 转小写
         * - 去掉地区后缀 en-US -> en, hi-IN -> hi
         * ------------------------- */
        function normalizeLang(code) {
            if (!code) return "";
            code = String(code).trim().toLowerCase();
            var i = code.indexOf("-");
            if (i > -1) {
                code = code.slice(0, i);
            }
            return code;
        }

        /* ---------------------------
    * 从全局翻译包中取语言数据，若缺失则回退 en
    * ------------------------- */
        function getLangData(langCode) {
            var packs = window.BEGINNER_GUIDE_TRANSLATIONS || {};
            if (packs[langCode]) return packs[langCode];
            return packs["en"] || { allData: {}, urlData: [] };
        }
        /* ---------------------------
         * 你的 getAppLanguage()（稍作增强）
         * 优先原生 -> URL ?lang= -> 默认 ar（EG）
         * 白名单：en, hi, ar（可扩展）
         * ------------------------- */
        function getAppLanguage() {
            var appLanguage = null;
            try {
                appLanguage = window.GLJsBridge.getLanguage(); // 原生容器提供
            } catch (error) {
                // 忽略，进入 fallback
            }

            if (!appLanguage) {
                var lang = getUrlParam("lang");
                appLanguage = lang ? lang : "ar";
            }

            appLanguage = normalizeLang(appLanguage);
            
            switch (appLanguage) {
                case "en":
                    return "en";
                case "hi":
                    return "hi";
                // 如需添加更多语言，在这里补分支即可：
                // case "pt": return "pt";
                case "ar": return "ar";
                case "eg": return "ar";
                default:
                    return "en";
            }
        }

        /* ---------------------------
         * 渲染逻辑
         * ------------------------- */
        (function init() {
            try {
                window.GLJsBridge.setToolbarVisibility("0"); // 原生容器提供
            } catch (error) {
                // 忽略，进入 fallback
            }
            const langCode = getAppLanguage();                       // en / hi
            // const pack = translations[langCode] || translations.en;  // fallback en
            const pack = getLangData(langCode);  // fallback en
            const container = document.getElementById('guide-container');

            // 设置 <html lang="">
            document.documentElement.setAttribute('lang', langCode);

            // 清空
            container.innerHTML = "";

            // 遍历 allData: {1:[...],2:[...]}
            Object.keys(pack.allData).forEach(function (key, index) {
                const div = document.createElement('div');

                // 图片（注意路径按你的实际部署改）
                if (pack.urlData[index]) {
                    console.log(" pack.urlData[index]", pack.urlData[index]);

                    const img = document.createElement('img');
                    img.src = pack.urlData[index]+'?v=1.1.0';
                    img.alt = "";
                    div.appendChild(img);
                }

                // 文本内容
                pack.allData[key].forEach(function (text) {
                    const p = document.createElement('p');
                    p.textContent = text;
                    div.appendChild(p);
                });

                container.appendChild(div);
            });
            
            document.querySelector('html').setAttribute('lang', langCode);
            if (langCode === 'ar') {
                document.querySelector('html').setAttribute('dir', 'rtl');
            } else {
                document.querySelector('html').setAttribute('dir', 'ltr')
            }
        })();
    </script>
</body>

</html>
